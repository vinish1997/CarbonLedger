name: Build & Test CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build Frontend & Run Backend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: carbonledger/frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd carbonledger/frontend
        npm ci

    - name: Build Frontend Assets
      run: |
        cd carbonledger/frontend
        npm run build

    - name: Copy Frontend Build to Spring Static Resources
      run: |
        mkdir -p carbonledger/backend/src/main/resources/static
        cp -r carbonledger/frontend/dist/* carbonledger/backend/src/main/resources/static/

    - name: Run Maven Backend Tests
      run: |
        cd carbonledger/backend
        mvn clean test
