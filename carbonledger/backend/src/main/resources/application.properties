# Server configuration
server.port=8080

# Database configurations (H2 database in-memory with custom credentials mapping)
spring.datasource.url=jdbc:h2:mem:carbonledgerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password_secure_placeholder}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# HikariCP Connection Pool settings for optimized throughput
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# Configure stable page serialization format for paginated REST endpoints
spring.data.web.pageable.page-serialization-mode=via-dto

# Keep requests bounded in size to prevent denial-of-service attempts
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Hardened Session Cookie configurations to prevent fixation and hijacking
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Security hardening: never leak internal stack traces or binding details in servlet error payloads
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
